[tox]
env_list = py312, py313, lint, type, cov, docs
isolated_build = True
# tox-uv pinned via ~= (not >=1.35,<2): tox's own ini-list loader splits
# single-line `requires` values on "," (only multi-*entry* lists preserve
# newline-splitting), so a literal ">=1.35,<2" is parsed as two bogus
# requirements ("tox-uv>=1.35" and "<2") and tox fails to even start.
# ~=1.35 is the packaging-spec equivalent of >=1.35,<2 (see D-07) with no
# comma, sidestepping the parser bug. Verified equivalent via
# `packaging.specifiers.SpecifierSet` in 04-01-SUMMARY.md.
requires = tox-uv~=1.35

[testenv]
description = Run tests with pytest
package = wheel
wheel_build_env = .pkg
runner = uv-venv-lock-runner
deps =
    pytest>=8.4,<10
    pytest-cov>=4.0
    sphinx>=9.1,<10
commands =
    pytest {posargs:tests/}

[testenv:lint]
description = Run linting checks
runner = uv-venv-lock-runner
deps =
    black>=26,<27
    ruff>=0.15,<0.16
commands =
    black --check .
    ruff check .

[testenv:type]
description = Run type checking with mypy
runner = uv-venv-lock-runner
deps =
    mypy>=1.13,<3.0
    sphinx>=9.1,<10
    types-docutils>=0.21
    docutils>=0.21,<0.23
commands =
    mypy typsphinx/

[testenv:cov]
description = Run tests with coverage
deps =
    {[testenv]deps}
commands =
    pytest --cov=typsphinx --cov-report=term-missing --cov-report=html {posargs:tests/}

[testenv:docs-html]
description = Build HTML documentation
runner = uv-venv-lock-runner
extras = docs
changedir = docs
commands =
    sphinx-build -b html source _build/html

[testenv:docs-pdf]
description = Build PDF documentation with typstpdf
runner = uv-venv-lock-runner
extras = docs
changedir = docs
commands =
    sphinx-build -b typstpdf source _build/pdf

[testenv:docs]
description = Build both HTML and PDF documentation
runner = uv-venv-lock-runner
extras = docs
changedir = docs
commands =
    sphinx-build -b html source _build/html
    sphinx-build -b typstpdf source _build/pdf

[testenv:docs-multilang]
description = Build multi-language HTML documentation (English + Japanese)
runner = uv-venv-lock-runner
extras = docs
changedir = docs
commands =
    python build_multilang.py
